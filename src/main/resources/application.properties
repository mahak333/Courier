#render:
spring.application.name=courier

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/courier_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mahak}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=2000MB
spring.servlet.multipart.file-size-threshold=10MB
spring.servlet.multipart.location=${java.io.tmpdir}

# Timeouts & Tomcat
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=60000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=10000

# Hikari
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# AWS
aws.region=${AWS_REGION:ap-south-1}
aws.bucket-name=${AWS_BUCKET_NAME:mahak-courier-storage}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.metrics.export.prometheus.enabled=false

# Port ? Render sets PORT automatically
server.port=${PORT:8080}

